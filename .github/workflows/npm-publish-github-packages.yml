name: Build and deploy Angular 18 app to Azure Web App - carrentalfrontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # STEP 1 — Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # STEP 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # STEP 3 — Install Dependencies
      - name: Install npm packages
        run: npm install

      # STEP 4 — Build Angular Production App
      - name: Build Angular App
        run: npm run build -- --configuration production

      # STEP 5 — Copy web.config for Angular Routing
      - name: Copy web.config
        run: cp web.config dist/car-rental/browser/web.config

      # STEP 6 — Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'carrentalfrontend'
          package: dist/car-rental/browser
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
