name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Angular App

    steps:
      # STEP 1 — Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # STEP 3 — Install Dependencies
      - name: Install npm packages
        run: npm install

      # STEP 4 — Build Angular App
      - name: Build Angular Production App
        run: npm run build -- --configuration production

      # STEP 5 — Deploy to Azure Static Web Apps
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_CLIFF_037E9FC00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          app_location: "/"
          api_location: ""
          output_location: "dist/my-websit/browser"
